# .github/workflows/content-deploy.yml
# Pipeline de contenido — Sitio web
# Se ejecuta cuando hay cambios en la carpeta website/

name: Content Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'

# Permisos necesarios para OIDC
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Website Content
    runs-on: ubuntu-latest

    steps:
      # ── 1. Descarga el código ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Autentica con AWS via OIDC ──
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── 3. Sube archivos a S3 ──
      #    Sincroniza solo los cambios
      #    Borra archivos que ya no existen
      - name: Sync to S3
        run: |
          aws s3 sync ./website s3://carlossanchezcloud-website-prod \
            --delete \
            --cache-control "max-age=31536000" \
            --exclude "*.html" 
          
          # HTML sin caché para siempre tener
          # la versión más reciente
          aws s3 sync ./website s3://carlossanchezcloud-website-prod \
            --delete \
            --cache-control "no-cache, no-store, must-revalidate" \
            --include "*.html" \
            --exclude "*"

      # ── 4. Invalida el caché de CloudFront ──
      #    Fuerza a CloudFront a servir
      #    los archivos nuevos inmediatamente
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

